<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALÉ — OKR & Activity Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f5f7fa;color:#222;}
.topbar{background:#0F6E56;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{width:36px;height:36px;border-radius:8px;background:#1D9E75;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#9FE1CB;}
.brand-name{font-size:16px;font-weight:700;}
.brand-sub{font-size:11px;opacity:.7;margin-top:1px;}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.topbar-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 13px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;}
.topbar-btn:hover{background:rgba(255,255,255,.25);}
.fb-badge{font-size:11px;padding:4px 10px;border-radius:10px;font-weight:700;}
.fb-ok{background:#E1F5EE;color:#0F6E56;}
.fb-err{background:#FCEBEB;color:#A32D2D;}
.fb-load{background:#FFF3CD;color:#BA7517;}
.tabs-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 24px;display:flex;overflow-x:auto;position:sticky;top:60px;z-index:99;}
.tab{padding:13px 15px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:#888;white-space:nowrap;font-weight:600;}
.tab.active{border-bottom-color:#0F6E56;color:#0F6E56;}
.tab:hover:not(.active){background:#f9f9f9;}
.main{padding:20px 24px;max-width:1080px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.metric{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e8e8e8;}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.metric-value{font-size:24px;font-weight:700;color:#222;}
.metric-sub{font-size:11px;color:#aaa;margin-top:2px;}
.card{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:16px 20px;margin-bottom:14px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.card-title{font-size:14px;font-weight:700;color:#222;}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:600;display:inline-block;}
.badge-green{background:#E1F5EE;color:#0F6E56;}
.badge-blue{background:#E6F1FB;color:#185FA5;}
.badge-amber{background:#FFF3CD;color:#BA7517;}
.badge-red{background:#FCEBEB;color:#A32D2D;}
.badge-gray{background:#F1F1F1;color:#555;}
.field-label{font-size:12px;color:#555;margin-bottom:4px;font-weight:700;}
.field-hint{font-size:11px;color:#aaa;margin-top:3px;}
.field-row{margin-bottom:12px;}
input[type=text],input[type=date],input[type=number],input[type=email],input[type=tel],select,textarea{width:100%;font-size:13px;border:1px solid #d0d0d0;border-radius:6px;padding:8px 10px;background:#fff;color:#222;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#0F6E56;box-shadow:0 0 0 2px rgba(15,110,86,.12);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid .field-row{margin-bottom:0;}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#333;font-weight:600;}
.btn-primary{background:#0F6E56;border-color:#0F6E56;color:#fff;}
.btn-primary:hover{background:#085041;}
.btn-danger{background:#A32D2D;border-color:#A32D2D;color:#fff;}
.btn-danger:hover{background:#791F1F;}
.btn:hover:not(.btn-primary):not(.btn-danger){background:#f5f5f5;}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.section-lbl{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;}
.add-btn{width:100%;padding:9px;border:1px dashed #ccc;border-radius:8px;font-size:13px;color:#888;cursor:pointer;background:transparent;margin-top:8px;}
.add-btn:hover{background:#f9f9f9;}
.okr-card{border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.okr-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.okr-card-title{font-size:13px;font-weight:700;color:#222;flex:1;}
.okr-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.kr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.kr-label{font-size:12px;color:#555;flex:1;min-width:0;}
.prog-wrap{width:90px;height:6px;background:#eee;border-radius:3px;overflow:hidden;flex-shrink:0;}
.prog-fill{height:100%;border-radius:3px;}
.kr-pct{font-size:12px;font-weight:700;width:34px;text-align:right;flex-shrink:0;color:#222;}
input[type=range]{width:80px;flex-shrink:0;cursor:pointer;}
.cons-card{border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.cons-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.cons-info{flex:1;min-width:0;}
.cons-name{font-size:14px;font-weight:700;color:#222;}
.cons-detail{font-size:12px;color:#888;margin-top:2px;}
.task-card{border:1px solid #e8e8e8;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.task-name{font-size:13px;font-weight:700;color:#222;margin-bottom:4px;}
.task-okr-ref{font-size:11px;color:#185FA5;margin-bottom:6px;}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.avance-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.avance-label{font-size:11px;color:#888;margin-bottom:3px;}
.avance-num{font-size:15px;font-weight:700;color:#222;}
.avance-bar-wrap{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:3px;}
.avance-bar{height:100%;border-radius:3px;}
.gap-tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;display:inline-block;margin-top:4px;}
.score-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.score-row:last-child{border-bottom:none;}
.score-bar-wrap{width:80px;height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:3px;}
.score-bar-fill{height:100%;border-radius:3px;}
.export-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
/* seguimiento */
.seg-cons-block{border:1px solid #e8e8e8;border-radius:12px;margin-bottom:16px;overflow:hidden;}
.seg-cons-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#fff;}
.seg-cons-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.seg-cons-info{flex:1;}
.seg-cons-name{font-size:14px;font-weight:700;color:#222;}
.seg-cons-meta{font-size:12px;color:#888;margin-top:2px;}
.seg-cons-badges{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.seg-tareas-list{background:#f9fafb;border-top:1px solid #eee;}
.seg-tarea-row{display:flex;align-items:flex-start;gap:10px;padding:10px 18px;border-bottom:1px solid #f0f0f0;}
.seg-tarea-row:last-child{border-bottom:none;}
.seg-tarea-alerta{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.seg-tarea-info{flex:1;min-width:0;}
.seg-tarea-name{font-size:13px;font-weight:700;color:#222;}
.seg-tarea-detail{font-size:11px;color:#888;margin-top:2px;}
.seg-tarea-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.seg-msg-block{background:#fff;border-top:1px solid #e8e8e8;padding:14px 18px;}
.seg-msg-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.seg-msg-text{background:#f5f7fa;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;font-family:Arial,sans-serif;}
.seg-copy-btn{font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;font-weight:600;color:#555;}
.seg-copy-btn:hover{background:#f0f0f0;}
.seg-copy-btn.copied{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB;}
.export-card{border:1px solid #e8e8e8;border-radius:10px;padding:16px;text-align:center;}
.export-card:hover{border-color:#0F6E56;background:#F0FAF6;}
.export-icon{width:44px;height:44px;border-radius:10px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.export-title{font-size:13px;font-weight:700;color:#222;margin-bottom:4px;}
.export-desc{font-size:11px;color:#888;line-height:1.5;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:24px 28px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;color:#0F6E56;margin-bottom:16px;}
.saving-toast{position:fixed;bottom:20px;right:20px;background:#0F6E56;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:300;display:none;}
@media(max-width:640px){
  .metrics{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .export-grid{grid-template-columns:1fr;}
  .avance-row{grid-template-columns:1fr;}
  .cons-card{flex-wrap:wrap;}
/* dashboard charts */
.dash-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.dash-filters select{font-size:12px;padding:6px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;width:auto;color:#222;}
.dash-filters label{font-size:12px;color:#888;font-weight:600;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.chart-card{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:16px 18px;}
.chart-title{font-size:13px;font-weight:700;color:#222;margin-bottom:4px;}
.chart-sub{font-size:11px;color:#aaa;margin-bottom:14px;}
.chart-wrap{position:relative;}
.okr-compliance-grid{display:grid;gap:10px;}
.okr-comp-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #e8e8e8;border-radius:8px;background:#fff;}
.okr-comp-info{flex:1;min-width:0;}
.okr-comp-title{font-size:12px;font-weight:700;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.okr-comp-owner{font-size:11px;color:#888;margin-top:1px;}
.okr-comp-bar-wrap{width:160px;flex-shrink:0;}
.okr-comp-bar-bg{height:8px;background:#eee;border-radius:4px;overflow:hidden;}
.okr-comp-bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.okr-comp-pct{font-size:13px;font-weight:700;min-width:40px;text-align:right;flex-shrink:0;}
.okr-comp-badge{flex-shrink:0;}
.resource-grid{display:grid;gap:8px;}
.resource-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid #e8e8e8;border-radius:8px;background:#fff;}
.resource-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.resource-info{flex:1;min-width:0;}
.resource-name{font-size:13px;font-weight:700;color:#222;}
.resource-detail{font-size:11px;color:#888;margin-top:1px;}
.resource-bars{width:200px;flex-shrink:0;}
.resource-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.resource-bar-label{font-size:10px;color:#aaa;width:50px;text-align:right;flex-shrink:0;}
.resource-bar-bg{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;}
.resource-bar-fill{height:100%;border-radius:3px;}
.resource-bar-val{font-size:10px;font-weight:700;width:28px;text-align:left;flex-shrink:0;}
.dash-empty{text-align:center;padding:30px;font-size:13px;color:#aaa;}
@media(max-width:680px){.charts-grid,.charts-grid-3{grid-template-columns:1fr;}}

</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-logo">KL</div>
    <div>
      <div class="brand-name">KALÉ</div>
      <div class="brand-sub">MS Teams · Canal General · OKR & Activity Tracker</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="fb-badge fb-load" id="fb-badge">Conectando...</span>
    <button class="topbar-btn" onclick="exportExcel()">Exportar Excel</button>
    <button class="topbar-btn" onclick="showPanel('export',null)">Reporte</button>
  </div>
</div>

<div class="tabs-bar">
  <div class="tab active" onclick="showPanel('dashboard',this)">Dashboard</div>
  <div class="tab" onclick="showPanel('consultores',this)">Consultores</div>
  <div class="tab" onclick="showPanel('okrs',this)">OKRs</div>
  <div class="tab" onclick="showPanel('link',this)">Vincular tareas</div>
  <div class="tab" onclick="showPanel('tasks',this)">Panel de tareas</div>
  <div class="tab" onclick="showPanel('score',this)">Score de valor</div>
  <div class="tab" onclick="showPanel('export',this)">Exportar</div>
  <div class="tab" style="color:#A32D2D;border-bottom-color:transparent;" onclick="showPanel('seguimiento',this)" id="tab-seguimiento">Seguimiento</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div class="panel active" id="panel-dashboard">

  <!-- top metrics -->
  <div class="metrics">
    <div class="metric" style="border-top:3px solid #0F6E56;">
      <div class="metric-label">Consultores</div><div class="metric-value" id="m-cons">—</div><div class="metric-sub">registrados</div>
    </div>
    <div class="metric" style="border-top:3px solid #185FA5;">
      <div class="metric-label">OKRs activos</div><div class="metric-value" id="m-okrs">—</div><div class="metric-sub">este periodo</div>
    </div>
    <div class="metric" style="border-top:3px solid #BA7517;">
      <div class="metric-label">Tareas vinculadas</div><div class="metric-value" id="m-tasks">—</div><div class="metric-sub">a un OKR</div>
    </div>
    <div class="metric" style="border-top:3px solid #534AB7;">
      <div class="metric-label">Score promedio</div><div class="metric-value" id="m-score">—</div><div class="metric-sub">de valor</div>
    </div>
  </div>

  <!-- filters -->
  <div class="dash-filters">
    <label>Filtrar por:</label>
    <select id="dash-filter-cons" onchange="renderDashboard()">
      <option value="">Todos los consultores</option>
    </select>
    <select id="dash-filter-okr" onchange="renderDashboard()">
      <option value="">Todos los OKRs</option>
    </select>
    <select id="dash-filter-period" onchange="renderDashboard()">
      <option value="">Todos los periodos</option>
      <option>Q1 · 2026</option><option>Q2 · 2026</option><option>Q3 · 2026</option><option>Q4 · 2026</option>
    </select>
    <button class="btn" style="font-size:12px;padding:5px 13px;" onclick="renderDashboard()">Actualizar</button>
  </div>

  <!-- row 1: cumplimiento OKR (full width) -->
  <div class="chart-card" style="margin-bottom:14px;">
    <div class="card-header" style="margin-bottom:6px;">
      <div>
        <div class="chart-title">Indicador de cumplimiento por OKR</div>
        <div class="chart-sub">Avance promedio de Key Results por objetivo · ordenado de menor a mayor</div>
      </div>
      <span class="badge badge-blue" id="dash-okr-count">— OKRs</span>
    </div>
    <div id="okr-compliance-list"><div class="dash-empty">Sin datos aún</div></div>
  </div>

  <!-- row 2: two charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Avance real vs esperado</div>
      <div class="chart-sub">Por consultor · barras comparativas</div>
      <div class="chart-wrap" style="height:220px;">
        <canvas id="chart-avance"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Distribución de estados</div>
      <div class="chart-sub">Tareas por estado actual</div>
      <div class="chart-wrap" style="height:220px;">
        <canvas id="chart-estados"></canvas>
      </div>
    </div>
  </div>

  <!-- row 3: three charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Score de valor</div>
      <div class="chart-sub">Por consultor · meta 80%</div>
      <div class="chart-wrap" style="height:200px;">
        <canvas id="chart-score"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Tareas por prioridad</div>
      <div class="chart-sub">Distribución Alta · Media · Baja</div>
      <div class="chart-wrap" style="height:200px;">
        <canvas id="chart-prioridad"></canvas>
      </div>
    </div>
  </div>

  <!-- row 4: resources full width -->
  <div class="chart-card" style="margin-bottom:14px;">
    <div class="card-header" style="margin-bottom:6px;">
      <div>
        <div class="chart-title">Carga de recursos</div>
        <div class="chart-sub">Tareas activas, avance y score por consultor</div>
      </div>
    </div>
    <div id="resource-list"><div class="dash-empty">Sin datos aún</div></div>
  </div>

  <!-- row 5: activity + alerts -->
  <div class="charts-grid">
    <div class="card" style="margin-bottom:0;">
      <div class="card-header"><span class="card-title">Actividad reciente</span><span class="badge badge-green">en vivo</span></div>
      <div id="activity-feed" style="font-size:13px;color:#aaa;padding:4px 0;">Cargando...</div>
    </div>
    <div class="card" style="margin-bottom:0;">
      <div class="card-header"><span class="card-title">Alertas de desvío</span><span class="badge badge-red" id="alerts-count" style="display:none;"></span></div>
      <div id="alerts-feed" style="font-size:13px;color:#aaa;padding:4px 0;">Cargando...</div>
    </div>
  </div>

</div>

<!-- CONSULTORES -->
<div class="panel" id="panel-consultores">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Equipo KALÉ</span>
      <button class="btn btn-primary" onclick="openConsModal()">+ Nuevo consultor</button>
    </div>
    <div id="cons-list"><p style="font-size:13px;color:#aaa;">Cargando...</p></div>
  </div>
</div>

<!-- OKRs -->
<div class="panel" id="panel-okrs">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Objetivos y Key Results</span>
      <button class="btn btn-primary" onclick="openOKRModal()">+ Nuevo OKR</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <select id="filter-okr-owner" onchange="renderOKRList()" style="font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;width:auto;">
        <option value="">Todos los consultores</option>
      </select>
      <select id="filter-okr-period" onchange="renderOKRList()" style="font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;width:auto;">
        <option value="">Todos los periodos</option>
        <option>Q1 · 2026</option><option>Q2 · 2026</option><option>Q3 · 2026</option><option>Q4 · 2026</option>
      </select>
    </div>
    <div id="okr-list"><p style="font-size:13px;color:#aaa;">Cargando...</p></div>
  </div>
</div>

<!-- VINCULAR TAREAS -->
<div class="panel" id="panel-link">
  <div class="card">
    <div class="card-header"><span class="card-title" id="link-form-title">Nueva tarea vinculada</span></div>
    <div class="field-row"><div class="field-label">Nombre de la tarea</div><input type="text" id="t-name" placeholder="Ej: Análisis de brecha cliente Bancolombia"></div>
    <div class="form-grid">
      <div class="field-row"><div class="field-label">Consultor</div><select id="t-owner"><option value="">— seleccionar —</option></select></div>
      <div class="field-row"><div class="field-label">Prioridad</div>
        <select id="t-prio"><option value="Alta">Alta</option><option value="Media" selected>Media</option><option value="Baja">Baja</option></select>
      </div>
    </div>
    <div class="form-grid">
      <div class="field-row"><div class="field-label">OKR vinculado</div><select id="t-okr" onchange="populateKRSelect()"><option value="">— seleccionar OKR —</option></select></div>

<script>
// ══ FIREBASE CONFIG ══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyD3A_1YoyZovfi_-iaGqH2HPgknX8B3wik",
  authDomain: "kale-tracker.firebaseapp.com",
  projectId: "kale-tracker",
  storageBucket: "kale-tracker.firebasestorage.app",
  messagingSenderId: "270091177841",
  appId: "1:270091177841:web:5ddb0cf54f2f47e12a70d0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ══ STATE (cache local) ══════════════════════════════════
const S = { consultores:[], okrs:[], tasks:[], krCount:1 };

const ESTADO_CFG = {
  'Pendiente Inicio':{cls:'badge-gray'},
  'En Progreso':     {cls:'badge-blue'},
  'Bloqueado':       {cls:'badge-red'},
  'Finalizada':      {cls:'badge-green'}
};
const AV_COLORS=['#E6F1FB','#E1F5EE','#FFF3CD','#EEEDFE','#FAECE7'];
const TX_COLORS=['#185FA5','#0F6E56','#BA7517','#3C3489','#993C1D'];
function avatarBg(n){return AV_COLORS[n.charCodeAt(0)%AV_COLORS.length];}
function avatarTx(n){return TX_COLORS[n.charCodeAt(0)%TX_COLORS.length];}
function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}

// ══ TOAST ════════════════════════════════════════════════
function showToast(msg='Guardado ✓'){
  const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

// ══ FIREBASE LISTENERS (tiempo real) ════════════════════
function initListeners(){
  const badge=document.getElementById('fb-badge');
  badge.className='fb-badge fb-ok'; badge.textContent='Firebase conectado';

  db.collection('consultores').orderBy('name').onSnapshot(snap=>{
    S.consultores=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderConsList(); refreshAllConsSelects(); updateMetrics();
    if(document.getElementById('panel-dashboard').classList.contains('active')) renderDashboard();
  });

  db.collection('okrs').orderBy('createdAt','desc').onSnapshot(snap=>{
    S.okrs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderOKRList(); updateMetrics();
    if(document.getElementById('panel-dashboard').classList.contains('active')) renderDashboard();
    else { renderScore(); renderAlerts(); }
  });

  db.collection('tareas').orderBy('createdAt','desc').onSnapshot(snap=>{
    S.tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderLinked(); renderTasks(); updateMetrics();
    if(document.getElementById('panel-dashboard').classList.contains('active')) renderDashboard();
    else { renderScore(); renderAlerts(); }
  });

  db.collection('actividad').orderBy('ts','desc').limit(20).onSnapshot(snap=>{
    const el=document.getElementById('activity-feed');
    if(!snap.docs.length){el.innerHTML='<p style="font-size:13px;color:#aaa;">Sin actividad aún.</p>';return;}
    el.innerHTML=snap.docs.map(d=>{
      const a=d.data();
      const t=a.ts?.toDate?a.ts.toDate():new Date();
      const time=t.getHours()+':'+(t.getMinutes()<10?'0':'')+t.getMinutes();
      return `<div style="padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px;color:#888;"><span style="color:#ccc;">${time}</span>  ${a.msg}</div>`;
    }).join('');
  });
}

function logActivity(msg){
  db.collection('actividad').add({msg, ts:firebase.firestore.FieldValue.serverTimestamp()});
}

// ══ NAVIGATION ═══════════════════════════════════════════
function showPanel(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(el) el.classList.add('active');
  if(id==='link'){populateConsSelect('t-owner'); populateOKRDropdown(); setTodayCreated();}
  if(id==='seguimiento'){populateConsSelect('seg-filter-cons'); renderSeguimiento();}
  if(id==='tasks'){populateConsSelect('filter-cons-task'); renderTasks();}
  if(id==='score') renderScore();
  if(id==='dashboard'){updateMetrics(); populateDashFilters(); renderDashboard();}
  if(id==='okrs'){populateConsSelect('filter-okr-owner'); renderOKRList();}
}

// ══ HELPERS ══════════════════════════════════════════════
function populateConsSelect(elId){
  const sel=document.getElementById(elId); if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">— seleccionar —</option>';
  S.consultores.forEach(c=>{const op=document.createElement('option');op.value=c.name;op.textContent=c.name;sel.appendChild(op);});
  sel.value=cur||'';
}
function refreshAllConsSelects(){
  ['t-owner','filter-cons-task','filter-okr-owner'].forEach(id=>populateConsSelect(id));
  const sel=document.getElementById('okr-owner');
  if(sel){const cur=sel.value;sel.innerHTML='<option value="">— seleccionar —</option>';S.consultores.forEach(c=>{const op=document.createElement('option');op.value=c.name;op.textContent=c.name;sel.appendChild(op);});sel.value=cur||'';}
}
function updateMetrics(){
  document.getElementById('m-cons').textContent=S.consultores.length;
  document.getElementById('m-okrs').textContent=S.okrs.length;
  document.getElementById('m-tasks').textContent=S.tasks.filter(t=>t.okrId).length;
}

// ══ CONSULTORES ═══════════════════════════════════════════
function openConsModal(id=null){
  const e=id?S.consultores.find(c=>c.id===id):null;
  document.getElementById('modal-cons-title').textContent=e?'Editar consultor':'Nuevo consultor';
  document.getElementById('c-name').value=e?e.name:'';
  document.getElementById('c-email').value=e?e.email:'';
  document.getElementById('c-wa').value=e?e.wa:'';
  document.getElementById('c-rol').value=e?e.rol:'Consultor';
  document.getElementById('c-edit-id').value=e?e.id:'';
  document.getElementById('modal-cons-bg').classList.add('open');
}
function closeConsModal(){document.getElementById('modal-cons-bg').classList.remove('open');}

async function saveCons(){
  const name=document.getElementById('c-name').value.trim();
  const email=document.getElementById('c-email').value.trim();
  const wa=document.getElementById('c-wa').value.trim();
  const rol=document.getElementById('c-rol').value;
  const editId=document.getElementById('c-edit-id').value;
  if(!name){alert('El nombre es obligatorio.');return;}
  const data={name,email,wa,rol,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(editId){
    await db.collection('consultores').doc(editId).update(data);
    logActivity(`Consultor actualizado: ${name}`);
  } else {
    data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('consultores').add(data);
    logActivity(`Consultor creado: ${name} · ${rol}`);
  }
  closeConsModal(); showToast('Consultor guardado ✓');
}

function deleteCons(id){
  const c=S.consultores.find(x=>x.id===id); if(!c) return;
  if(!confirm(`¿Eliminar a "${c.name}"?`)) return;
  db.collection('consultores').doc(id).delete();
  logActivity(`Consultor eliminado: ${c.name}`);
  showToast('Consultor eliminado');
}

function renderConsList(){
  const el=document.getElementById('cons-list');
  if(!S.consultores.length){el.innerHTML='<p style="font-size:13px;color:#aaa;">Aún no hay consultores.</p>';return;}
  el.innerHTML=S.consultores.map(c=>`
    <div class="cons-card">
      <div class="cons-avatar" style="background:${avatarBg(c.name)};color:${avatarTx(c.name)};">${initials(c.name)}</div>
      <div class="cons-info">
        <div class="cons-name">${c.name}</div>
        <div class="cons-detail">
          <span class="badge badge-gray" style="margin-right:4px;">${c.rol||''}</span>
          ${c.email?`<span>${c.email}</span>`:''}
          ${c.wa?`<span style="margin-left:8px;">WA: ${c.wa}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn" style="font-size:12px;padding:5px 12px;" onclick="openConsModal('${c.id}')">Editar</button>
        <button class="btn btn-danger" style="font-size:12px;padding:5px 12px;" onclick="deleteCons('${c.id}')">Eliminar</button>
      </div>
    </div>`).join('');
}

// ══ OKRs ══════════════════════════════════════════════════
let krCount=1;
function openOKRModal(id=null){
  const e=id?S.okrs.find(o=>o.id===id):null;
  document.getElementById('modal-okr-title').textContent=e?'Editar OKR':'Nuevo OKR';
  document.getElementById('okr-obj').value=e?e.obj:'';
  document.getElementById('okr-period').value=e?e.period:'Q2 · 2026';
  document.getElementById('okr-edit-id').value=e?e.id:'';
  const sel=document.getElementById('okr-owner');
  sel.innerHTML='<option value="">— seleccionar —</option>';
  S.consultores.forEach(c=>{const op=document.createElement('option');op.value=c.name;op.textContent=c.name;sel.appendChild(op);});
  sel.value=e?e.owner:'';
  const kc=document.getElementById('kr-inputs'); kc.innerHTML=''; krCount=0;
  const krs=e?e.krs:[{label:'',target:100}];
  krs.forEach((kr,i)=>{
    krCount++;
    const d=document.createElement('div');
    d.className='form-grid field-row'; d.style.alignItems='flex-end';
    d.innerHTML=`<div><div class="field-label">KR ${i+1}</div><input type="text" value="${kr.label||''}" placeholder="Key Result ${i+1}"></div><div><div class="field-label">Meta %</div><input type="number" value="${kr.target||100}" min="0" max="100"></div>`;
    kc.appendChild(d);
  });
  document.getElementById('modal-okr-bg').classList.add('open');
}
function closeOKRModal(){document.getElementById('modal-okr-bg').classList.remove('open');}

function addKRInput(){
  krCount++;
  const c=document.getElementById('kr-inputs');
  const d=document.createElement('div');
  d.className='form-grid field-row'; d.style.alignItems='flex-end';
  d.innerHTML=`<div><div class="field-label">KR ${krCount}</div><input type="text" placeholder="Key Result ${krCount}"></div><div><div class="field-label">Meta %</div><input type="number" placeholder="100" min="0" max="100"></div>`;
  c.appendChild(d);
}

async function saveOKR(){
  const obj=document.getElementById('okr-obj').value.trim();
  const owner=document.getElementById('okr-owner').value;
  const period=document.getElementById('okr-period').value;
  const editId=document.getElementById('okr-edit-id').value;
  if(!obj||!owner){alert('Completa el objetivo y el consultor.');return;}
  const krs=[];
  document.querySelectorAll('#kr-inputs .form-grid').forEach(row=>{
    const ins=row.querySelectorAll('input');
    if(ins[0]&&ins[0].value.trim()){
      const prev=editId?S.okrs.find(x=>x.id===editId)?.krs?.find(k=>k.label===ins[0].value.trim()):null;
      krs.push({label:ins[0].value.trim(),target:parseInt(ins[1]?.value)||100,progress:prev?prev.progress:0});
    }
  });
  if(!krs.length){alert('Agrega al menos un Key Result.');return;}
  const data={obj,owner,period,krs,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(editId){
    await db.collection('okrs').doc(editId).update(data);
    logActivity(`OKR actualizado: "${obj.slice(0,40)}" — ${owner}`);
  } else {
    data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('okrs').add(data);
    logActivity(`OKR creado: "${obj.slice(0,40)}" — ${owner}`);
  }
  closeOKRModal(); showToast('OKR guardado ✓');
}

async function deleteOKR(id){
  const o=S.okrs.find(x=>x.id===id); if(!o) return;
  if(!confirm(`¿Eliminar el OKR "${o.obj.slice(0,50)}"?`)) return;
  await db.collection('okrs').doc(id).delete();
  logActivity(`OKR eliminado: "${o.obj.slice(0,35)}"`);
  showToast('OKR eliminado');
}

async function updateKR(oid,ki,val){
  const o=S.okrs.find(x=>x.id===oid); if(!o) return;
  const v=parseInt(val);
  const pf=document.getElementById(`pf-${oid}-${ki}`);
  const pp=document.getElementById(`pp-${oid}-${ki}`);
  if(pf){pf.style.width=v+'%';pf.style.background=v>=70?'#1D9E75':v>=40?'#BA7517':'#E24B4A';}
  if(pp) pp.textContent=v+'%';
  const newKRs=[...o.krs]; newKRs[ki]={...newKRs[ki],progress:v};
  await db.collection('okrs').doc(oid).update({krs:newKRs,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
}

function setTodayCreated(){
  const el=document.getElementById('t-created');
  if(!el.value) el.value=new Date().toISOString().split('T')[0];
}

function calcExpected(){
  const c=document.getElementById('t-created').value;
  const d=document.getElementById('t-due').value;
  const avance=parseInt(document.getElementById('t-avance').value)||0;
  const expPct=document.getElementById('exp-pct');
  const expBar=document.getElementById('exp-bar');
  const gapDiv=document.getElementById('gap-preview');
  if(!c||!d){expPct.textContent='—';expBar.style.width='0%';gapDiv.style.display='none';return;}
  const total=new Date(d)-new Date(c); if(total<=0){expPct.textContent='100%';return;}
  const elapsed=Math.min(Math.max(new Date()-new Date(c),0),total);
  const expected=Math.round((elapsed/total)*100);
  expPct.textContent=expected+'%';
  expBar.style.width=expected+'%';
  expBar.style.background=expected>=70?'#1D9E75':expected>=40?'#BA7517':'#378ADD';
  document.getElementById('exp-hint').textContent='Días transcurridos ÷ días totales × 100';
  const gap=expected-avance;
  gapDiv.style.display='block';
  if(gap>20){gapDiv.style.cssText='display:block;padding:9px 13px;border-radius:7px;margin-bottom:12px;font-size:12px;font-weight:600;background:#FCEBEB;border:1px solid #f0a0a0;color:#A32D2D;';gapDiv.textContent='Desvío: '+gap+' pts — tarea retrasada.';}
  else if(gap>0){gapDiv.style.cssText='display:block;padding:9px 13px;border-radius:7px;margin-bottom:12px;font-size:12px;font-weight:600;background:#FFF3CD;border:1px solid #f0c040;color:#BA7517;';gapDiv.textContent='Desvío leve: '+gap+' pts. Revisar pronto.';}
  else{gapDiv.style.cssText='display:block;padding:9px 13px;border-radius:7px;margin-bottom:12px;font-size:12px;font-weight:600;background:#E1F5EE;border:1px solid #9FE1CB;color:#0F6E56;';gapDiv.textContent='En tiempo. Avance real ≥ esperado.';}
}

function populateOKRDropdown(){
  const sel=document.getElementById('t-okr'); const cur=sel.value;
  sel.innerHTML='<option value="">— seleccionar OKR —</option>';
  S.okrs.forEach(o=>{const op=document.createElement('option');op.value=o.id;op.textContent=o.obj.length>55?o.obj.slice(0,55)+'…':o.obj;sel.appendChild(op);});
  sel.value=cur||'';
}
function populateKRSelect(){
  const okrId=document.getElementById('t-okr').value;
  const krSel=document.getElementById('t-kr');
  krSel.innerHTML='<option value="">— seleccionar KR —</option>';
  const o=S.okrs.find(x=>x.id===okrId);
  if(o)(o.krs||[]).forEach((kr,i)=>{const op=document.createElement('option');op.value=i;op.textContent=kr.label.length>50?kr.label.slice(0,50)+'…':kr.label;krSel.appendChild(op);});
}
function getExpected(c,d){
  if(!c||!d) return null;
  const total=new Date(d)-new Date(c); if(total<=0) return 100;
  return Math.round((Math.min(Math.max(new Date()-new Date(c),0),total)/total)*100);
}

function editTask(id){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  showPanel('link',document.querySelector('.tab:nth-child(4)'));
  document.getElementById('link-form-title').textContent='Editar tarea';
  document.getElementById('t-save-btn').textContent='Guardar cambios';
  document.getElementById('t-edit-id').value=id;
  document.getElementById('t-name').value=t.name;
  document.getElementById('t-prio').value=t.prio;
  document.getElementById('t-created').value=t.created||'';
  document.getElementById('t-due').value=t.due||'';
  document.getElementById('t-estado').value=t.estado;
  document.getElementById('t-avance').value=t.avance;
  populateConsSelect('t-owner'); populateOKRDropdown();

}

async function deleteTask(id){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  if(!confirm(`¿Eliminar la tarea "${t.name}"?`)) return;
  await db.collection('tareas').doc(id).delete();
  logActivity(`Tarea eliminada: "${t.name.slice(0,35)}"`);
  showToast('Tarea eliminada');
}

async function saveTask(){
  const name=document.getElementById('t-name').value.trim();
  const owner=document.getElementById('t-owner').value;
  if(!name||!owner){alert('Completa nombre y consultor.');return;}
  const okrId=document.getElementById('t-okr').value;
  const krIdx=document.getElementById('t-kr').value;
  const okr=S.okrs.find(x=>x.id===okrId);
  const created=document.getElementById('t-created').value;
  const due=document.getElementById('t-due').value;
  const avance=Math.min(100,Math.max(0,parseInt(document.getElementById('t-avance').value)||0));
  const estado=document.getElementById('t-estado').value;
  const editId=document.getElementById('t-edit-id').value;
  const data={
    name,owner,
    okrId:okrId||null, okrLabel:okr?okr.obj:null,
    krIdx:krIdx!==''?parseInt(krIdx):null,
    krLabel:(okr&&krIdx!=='')?okr.krs[parseInt(krIdx)]?.label||null:null,
    prio:document.getElementById('t-prio').value,
    created,due,avance,estado,
    expected:getExpected(created,due),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  if(editId){
    await db.collection('tareas').doc(editId).update(data);
    logActivity(`Tarea actualizada: "${name.slice(0,35)}" · ${estado}`);
  } else {
    data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('tareas').add(data);
    logActivity(`Tarea creada: "${name.slice(0,35)}" — ${owner} · ${estado}`);
  }
  clearTaskForm(); showToast('Tarea guardada ✓');
}

function renderScore(){
  const el=document.getElementById('score-list');
  const owners=[...new Set(S.tasks.map(t=>t.owner))];
  if(!owners.length){el.innerHTML='<p style="font-size:13px;color:#aaa;">Registra tareas para ver el score.</p>';return;}
  const rows=owners.map(owner=>{
    const ot=S.tasks.filter(t=>t.owner===owner);
    const linked=ot.filter(t=>t.okrId);
    const avgA=linked.length?Math.round(linked.reduce((a,t)=>a+t.avance,0)/linked.length):0;
    const oo=S.okrs.filter(o=>o.owner===owner);
    const allKRs=oo.flatMap(o=>o.krs||[]);
    const okrS=allKRs.length?Math.round((allKRs.filter(k=>(k.progress||0)>0).length/allKRs.length)*100):0;
    const score=Math.round(avgA*0.6+okrS*0.4);
    const color=score>=70?'#1D9E75':score>=40?'#BA7517':'#E24B4A';
    return {owner,score,color,ot,linked,avgA,okrS};
  });
  el.innerHTML=rows.map(r=>`
    <div class="score-row">
      <div style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:${avatarBg(r.owner)};color:${avatarTx(r.owner)};">${initials(r.owner)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:#222;">${r.owner}</div>
        <div style="font-size:11px;color:#888;">${r.ot.length} tareas · ${r.linked.length} vinculadas · avance ${r.avgA}% · OKR ${r.okrS}%</div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${r.score}%;background:${r.color};"></div></div>
      </div>
      <span class="badge ${r.score>=70?'badge-green':r.score>=40?'badge-amber':'badge-red'}">${r.score}%</span>
    </div>`).join('');
  const avg=Math.round(rows.reduce((a,r)=>a+r.score,0)/rows.length);
  document.getElementById('m-score').textContent=rows.length?avg+'%':'—';
}

function renderAlerts(){

  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['ID','Nombre','Email','WhatsApp','Rol'],
    ...S.consultores.map(c=>[c.id,c.name,c.email,c.wa,c.rol])
  ]),'Consultores');
  const okrRows=[['ID OKR','Objetivo','Consultor','Periodo','KR','Meta %','Avance %']];
  S.okrs.forEach(o=>(o.krs||[]).forEach(kr=>okrRows.push([o.id,o.obj,o.owner,o.period,kr.label,kr.target,kr.progress||0])));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(okrRows),'OKRs');

}

      const score=Math.round(avgA*0.6+okrS*0.4);
      const sc=score>=70?'#0F6E56':score>=40?'#BA7517':'#A32D2D';
      body+=`<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;"><strong>${owner}</strong> — ${ot.length} tareas · avance ${avgA}% · score <span style="color:${sc};font-weight:700;">${score}%</span>${alerts.length?` · <span style="color:#A32D2D;">${alerts.length} alerta(s)</span>`:''}</div>`;

}

function getDashData(){
  const fc = document.getElementById('dash-filter-cons')?.value||'';
  const fo = document.getElementById('dash-filter-okr')?.value||'';
  const fp = document.getElementById('dash-filter-period')?.value||'';
  let tasks = S.tasks;
  let okrs  = S.okrs;
  if(fc){ tasks=tasks.filter(t=>t.owner===fc); }
  if(fo){ tasks=tasks.filter(t=>t.okrId===fo); okrs=okrs.filter(o=>o.id===fo); }

  if(!okrs.length){ el.innerHTML='<div class="dash-empty">Sin OKRs registrados</div>'; badge.textContent='0 OKRs'; return; }
  badge.textContent = okrs.length+' OKR'+(okrs.length!==1?'s':'');

  const rows = okrs.map(o=>{
    const krs = o.krs||[];
    const avgKR = krs.length ? Math.round(krs.reduce((a,k)=>a+(k.progress||0),0)/krs.length) : 0;
    // task-based avance for this OKR
    const linkedTasks = tasks.filter(t=>t.okrId===o.id);
    const avgTask = linkedTasks.length ? Math.round(linkedTasks.reduce((a,t)=>a+t.avance,0)/linkedTasks.length) : null;
    // compliance = weighted avg KR progress
    const compliance = avgKR;
    return {...o, compliance, avgKR, avgTask, krs, linkedTasks};
  }).sort((a,b)=>a.compliance-b.compliance);

  el.innerHTML = `<div class="okr-compliance-grid">${rows.map(o=>{
    const c = o.compliance;
    const color = c>=80?'#1D9E75':c>=50?'#BA7517':'#E24B4A';
    const cls   = c>=80?'badge-green':c>=50?'badge-amber':'badge-red';
    const label = c>=80?'En meta':c>=50?'En progreso':'En riesgo';
    const krsDetail = o.krs.map(kr=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="font-size:11px;color:#666;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${kr.label}</span>
        <div style="width:80px;height:4px;background:#eee;border-radius:2px;overflow:hidden;flex-shrink:0;">
          <div style="height:100%;border-radius:2px;background:${(kr.progress||0)>=70?'#1D9E75':(kr.progress||0)>=40?'#BA7517':'#E24B4A'};width:${kr.progress||0}%;"></div>
        </div>
        <span style="font-size:11px;font-weight:700;color:#222;width:28px;text-align:right;flex-shrink:0;">${kr.progress||0}%</span>
      </div>`).join('');
    return `<div class="okr-comp-row">
      <div class="okr-comp-info">
        <div class="okr-comp-title" title="${o.obj}">${o.obj}</div>
        <div style="font-size:11px;color:#888;margin-top:2px;">${o.owner} · ${o.period} · ${o.krs.length} KR${o.krs.length!==1?'s':''} · ${o.linkedTasks.length} tarea${o.linkedTasks.length!==1?'s':''}</div>
        <div style="margin-top:8px;">${krsDetail}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;padding-left:14px;">
        <span style="font-size:22px;font-weight:700;color:${color};">${c}%</span>
        <span class="badge ${cls}">${label}</span>
        ${o.avgTask!==null?`<span style="font-size:11px;color:#aaa;">Tareas: ${o.avgTask}%</span>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

  if(!owners.length){ ctx.canvas.parentNode.innerHTML='<div class="dash-empty">Sin datos</div>'; return; }
  const real = owners.map(o=>{ const t=tasks.filter(x=>x.owner===o&&x.okrId); return t.length?Math.round(t.reduce((a,x)=>a+x.avance,0)/t.length):0; });
  const esp  = owners.map(o=>{ const t=tasks.filter(x=>x.owner===o&&x.okrId&&x.expected!=null); return t.length?Math.round(t.reduce((a,x)=>a+(x.expected||0),0)/t.length):0; });

// ══ SEGUIMIENTO ══════════════════════════════════════════
const PANEL_URL = 'https://tonpolas.github.io/kale-tracker';
const DIAS_INACTIVA = 3;
const DESVIO_UMBRAL = 20;

function diasSinActualizar(t){
  const ref = t.updatedAt?.toDate ? t.updatedAt.toDate() : t.updatedAt ? new Date(t.updatedAt) : null;
  if(!ref) return 999;
  return Math.floor((new Date()-ref)/(1000*60*60*24));
}

function clasificarTarea(t){
  const dias = diasSinActualizar(t);
  const desvio = (t.expected!=null && t.avance!=null) ? t.expected - t.avance : null;
  const tieneDesvio = desvio !== null && desvio > DESVIO_UMBRAL;
  const inactiva = dias > DIAS_INACTIVA;
  const finalizada = t.estado === 'Finalizada';
  if(finalizada) return null;
  if(tieneDesvio && inactiva) return {tipo:'ambos', desvio, dias, color:'#A32D2D'};
  if(tieneDesvio) return {tipo:'desvio', desvio, dias, color:'#BA7517'};
  if(inactiva) return {tipo:'inactiva', desvio, dias, color:'#185FA5'};
  return null;
}

function renderSeguimiento(){
  const filterCons = document.getElementById('seg-filter-cons')?.value||'';
  const filterTipo = document.getElementById('seg-filter-tipo')?.value||'';

  // classify all tasks
  const atrasadas = S.tasks
    .map(t=>({...t, _cls: clasificarTarea(t)}))
    .filter(t=> t._cls !== null)
    .filter(t=> !filterCons || t.owner === filterCons)
    .filter(t=> {
      if(!filterTipo) return true;
      return t._cls.tipo === filterTipo || (filterTipo==='ambos' && t._cls.tipo==='ambos');
    });

  // update top metrics
  const owners = [...new Set(atrasadas.map(t=>t.owner))];
  document.getElementById('seg-total').textContent = atrasadas.length;
  document.getElementById('seg-cons').textContent = owners.length;
  const avgDesvio = atrasadas.filter(t=>t._cls.desvio!=null).length
    ? Math.round(atrasadas.filter(t=>t._cls.desvio!=null).reduce((a,t)=>a+t._cls.desvio,0)/atrasadas.filter(t=>t._cls.desvio!=null).length)
    : 0;
  document.getElementById('seg-desvio').textContent = avgDesvio > 0 ? '+'+avgDesvio : avgDesvio;
  document.getElementById('seg-fecha').textContent = new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'short'});

  const el = document.getElementById('seg-cards');
  if(!atrasadas.length){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;">
      <div style="font-size:32px;margin-bottom:12px;">✓</div>
      <div style="font-size:15px;font-weight:700;color:#0F6E56;">Todo al día</div>
      <div style="font-size:13px;color:#aaa;margin-top:6px;">No hay tareas atrasadas ni inactivas en este momento.</div>
    </div>`;
    return;
  }

  // group by consultant
  el.innerHTML = owners.map(owner=>{
    const tareas = atrasadas.filter(t=>t.owner===owner);
    const cons = S.consultores.find(c=>c.name===owner);
    const criticas = tareas.filter(t=>t._cls.tipo==='ambos').length;
    const desvio_only = tareas.filter(t=>t._cls.tipo==='desvio').length;
    const inactiva_only = tareas.filter(t=>t._cls.tipo==='inactiva').length;
    const msg = generarMensaje(owner, tareas, cons);
    const bg = avatarBg(owner); const tx = avatarTx(owner);
    const ini = initials(owner);

    return `<div class="seg-cons-block">
      <div class="seg-cons-header">
        <div class="seg-cons-avatar" style="background:${bg};color:${tx};">${ini}</div>
        <div class="seg-cons-info">
          <div class="seg-cons-name">${owner}</div>
          <div class="seg-cons-meta">
            ${cons?.email?`<span>${cons.email}</span>`:''}
            ${cons?.wa?`<span style="margin-left:10px;">WA: ${cons.wa}</span>`:''}
          </div>
        </div>
        <div class="seg-cons-badges">
          ${criticas?`<span class="badge badge-red">${criticas} crítica${criticas>1?'s':''}</span>`:''}
          ${desvio_only?`<span class="badge badge-amber">${desvio_only} desvío</span>`:''}
          ${inactiva_only?`<span class="badge badge-blue">${inactiva_only} inactiva${inactiva_only>1?'s':''}</span>`:''}
          <span class="badge badge-gray">${tareas.length} total</span>
        </div>
      </div>

      <div class="seg-tareas-list">
        ${tareas.map(t=>{
          const c=t._cls;
          const tipotxt = c.tipo==='ambos'?'Desvío + inactiva':c.tipo==='desvio'?'Desvío de avance':'Sin actualizar';
          const detalle = [
            c.desvio!=null?`Esperado ${t.expected}% · Real ${t.avance}% · Desvío ${c.desvio} pts`:'',
            c.dias<999?`Última actualización hace ${c.dias} día${c.dias!==1?'s':''}`:'Sin registro de actualización',
            t.due?`Límite: ${t.due}`:''
          ].filter(Boolean).join(' · ');
          return `<div class="seg-tarea-row">
            <div class="seg-tarea-alerta" style="background:${c.color};"></div>
            <div class="seg-tarea-info">
              <div class="seg-tarea-name">${t.name}</div>
              <div class="seg-tarea-detail">${detalle}</div>
              <div class="seg-tarea-badges">
                <span class="badge ${c.tipo==='ambos'?'badge-red':c.tipo==='desvio'?'badge-amber':'badge-blue'}">${tipotxt}</span>
                <span class="badge badge-gray">${t.estado}</span>
                ${t.okrLabel?`<span class="badge badge-gray" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">OKR: ${t.okrLabel.slice(0,35)}</span>`:''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="seg-msg-block">
        <div class="seg-msg-label">
          <span>Mensaje para ${owner.split(' ')[0]}</span>
          <button class="seg-copy-btn" onclick="copiarMensaje(this, '${owner}')">Copiar mensaje</button>
        </div>
        <div class="seg-msg-text" id="msg-${owner.replace(/\s+/g,'_')}">${msg}</div>
      </div>
    </div>`;
  }).join('');
}

function generarMensaje(owner, tareas, cons){
  const nombre = owner.split(' ')[0];
  const hoy = new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  const criticas = tareas.filter(t=>t._cls.tipo==='ambos');
  const desvio = tareas.filter(t=>t._cls.tipo==='desvio');
  const inactivas = tareas.filter(t=>t._cls.tipo==='inactiva');

  let msg = `Hola ${nombre}, buen día 👋\n\n`;
  msg += `Es ${hoy}. Revisando el panel KALÉ, encontré que tienes ${tareas.length} tarea${tareas.length>1?'s':''} que necesita${tareas.length>1?'n':''} atención:\n\n`;

  if(criticas.length){
    msg += `🔴 *CRÍTICAS — Desvío alto y sin actualizar:*\n`;
    criticas.forEach(t=>{
      msg += `• ${t.name}\n`;
      msg += `  Avance esperado: ${t.expected}% · Real: ${t.avance}% · Desvío: ${t._cls.desvio} pts\n`;
      msg += `  Sin actualizar hace ${t._cls.dias} día${t._cls.dias!==1?'s':''}\n`;
      if(t.due) msg += `  Límite: ${t.due}\n`;
      msg += '\n';
    });
  }

  if(desvio.length){
    msg += `🟡 *DESVÍO DE AVANCE:*\n`;
    desvio.forEach(t=>{
      msg += `• ${t.name}\n`;
      msg += `  Esperado: ${t.expected}% · Real: ${t.avance}% · Desvío: ${t._cls.desvio} pts\n`;
      if(t.due) msg += `  Límite: ${t.due}\n`;
      msg += '\n';
    });
  }

  if(inactivas.length){
    msg += `🔵 *SIN ACTUALIZAR (${DIAS_INACTIVA}+ días):*\n`;
    inactivas.forEach(t=>{
      msg += `• ${t.name} — ${t._cls.dias} día${t._cls.dias!==1?'s':''} sin actualizar\n`;
      if(t.due) msg += `  Límite: ${t.due}\n`;
    });
    msg += '\n';
  }

  msg += `Por favor actualiza tu avance y estado en el panel:\n`;
  msg += `👉 ${PANEL_URL}\n\n`;
  msg += `Cualquier duda me cuentas. ¡Gracias!`;
  return msg;
}

function copiarMensaje(btn, owner){
  const key = owner.replace(/\s+/g,'_');
  const el = document.getElementById('msg-'+key);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>{
    btn.textContent='¡Copiado!'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copiar mensaje';btn.classList.remove('copied');},2500);
  }).catch(()=>{ prompt('Copia el mensaje:', el.textContent); });
}

function generarTodosLosMensajes(){
  const filterCons = document.getElementById('seg-filter-cons')?.value||'';
  const atrasadas = S.tasks
    .map(t=>({...t, _cls:clasificarTarea(t)}))
    .filter(t=>t._cls!==null)
    .filter(t=>!filterCons||t.owner===filterCons);
  if(!atrasadas.length){alert('No hay tareas atrasadas en este momento.');return;}
  const owners=[...new Set(atrasadas.map(t=>t.owner))];
  let todos='';
  owners.forEach(owner=>{
    const cons=S.consultores.find(c=>c.name===owner);
    const tareas=atrasadas.filter(t=>t.owner===owner);
    todos+=`${'═'.repeat(50)}\n`;
    todos+=`MENSAJE PARA: ${owner.toUpperCase()}`;
    if(cons?.wa) todos+=` (WA: ${cons.wa})`;
    todos+='\n'+'═'.repeat(50)+'\n\n';
    todos+=generarMensaje(owner,tareas,cons)+'\n\n';
  });
  const blob=new Blob([todos],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`KALE_Seguimiento_${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); URL.revokeObjectURL(url);
  logActivity(`Seguimiento generado: ${owners.length} consultor${owners.length>1?'es':''} con alertas`);
}
